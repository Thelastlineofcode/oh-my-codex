# Oh My Codex - Codex CLI Configuration
# Copy this to ~/.codex/config.toml

[model]
# Default model for general tasks
default = "gpt-5.1-codex"

# Model routing by task complexity
[model.routing]
nano = "gpt-5-nano"           # Fastest, simple queries
mini = "gpt-5-mini"           # Fast, eco mode
standard = "gpt-5.1-codex"    # Default, balanced
powerful = "gpt-5.2-codex"    # Complex tasks, autopilot
max = "gpt-5.1-codex-max"     # Long-running, ralph/ultrapilot

# Reasoning effort: none | low | medium | high
[model.reasoning]
default = "none"
eco = "none"
plan = "medium"
autopilot = "medium"
ultrawork = "low"
ultrapilot = "high"
ralph = "high"
review = "high"
debug = "high"

[skills]
# Skills are auto-loaded from ~/.codex/skills/ and .codex/skills/
auto_load = true

[compaction]
# Enable for long-running sessions
enabled = true
threshold_tokens = 100000

[mcp]
# MCP servers for tool integration
# Uncomment and configure as needed

# [mcp.filesystem]
# command = "npx"
# args = ["-y", "@anthropic/mcp-server-filesystem", "/path/to/allowed/dir"]

# [mcp.github]
# command = "npx"
# args = ["-y", "@anthropic/mcp-server-github"]
# env = { GITHUB_TOKEN = "your-token" }

# [mcp.postgres]
# command = "npx"
# args = ["-y", "@anthropic/mcp-server-postgres", "postgresql://..."]

[profiles]
# Profile-specific settings

[profiles.autopilot]
model = "o3"
approval_mode = "auto-edit"

[profiles.eco]
model = "gpt-4.1-mini"
approval_mode = "auto-edit"

[profiles.safe]
model = "o3"
approval_mode = "suggest"
